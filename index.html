<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Nifty MidSmall400 Dashboard</title>

  <!-- Chart.js library from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 30px;
    }

    h1 {
      margin-bottom: 8px;
    }

    p {
      color: #555;
      margin-top: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 24px;
    }

    .card, .note {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .note {
      margin-top: 24px;
    }

    .label {
      font-size: 14px;
      color: #666;
    }

    .value {
      font-size: 28px;
      font-weight: bold;
      margin-top: 8px;
    }

    .note-text {
      font-size: 20px;
      font-weight: bold;
      margin-top: 8px;
    }

    table {
      width: 100%;
      margin-top: 16px;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      text-align: left;
      padding: 10px;
      border-bottom: 1px solid #e5e5e5;
    }

    canvas {
      margin-top: 16px;
      max-height: 320px;
    }
  </style>
</head>
<body>

  <!-- Dashboard title and date -->
  <h1 id="title">Loading...</h1>
  <p>As of: <span id="asOf">-</span></p>

  <!-- Top summary cards -->
  <div class="grid">
    <div class="card">
      <div class="label">Market Regime</div>
      <div class="value" id="regime">-</div>
    </div>

    <div class="card">
      <div class="label">Breadth Score</div>
      <div class="value" id="breadthScore">-</div>
    </div>

    <div class="card">
      <div class="label">Above 20 DMA</div>
      <div class="value" id="above20DMA">-</div>
    </div>

    <div class="card">
      <div class="label">Above 50 DMA</div>
      <div class="value" id="above50DMA">-</div>
    </div>

    <div class="card">
      <div class="label">Above 200 DMA</div>
      <div class="value" id="above200DMA">-</div>
    </div>

    <div class="card">
      <div class="label">Advances</div>
      <div class="value" id="advances">-</div>
    </div>

    <div class="card">
      <div class="label">Declines</div>
      <div class="value" id="declines">-</div>
    </div>

    <div class="card">
      <div class="label">New Highs</div>
      <div class="value" id="newHighs">-</div>
    </div>

    <div class="card">
      <div class="label">New Lows</div>
      <div class="value" id="newLows">-</div>
    </div>

    <div class="card">
      <div class="label">Day Change</div>
      <div class="value" id="dayChange">-</div>
    </div>
  </div>

  <!-- Status note -->
  <div class="note">
    <div class="label">Status Note</div>
    <div class="note-text" id="statusNote">-</div>
  </div>

  <!-- History table -->
  <div class="note">
    <div class="label">Recent Trend</div>
    <table id="historyTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>Breadth Score</th>
          <th>Above 20 DMA</th>
          <th>Above 50 DMA</th>
          <th>Above 200 DMA</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- Chart area -->
  <div class="note">
    <div class="label">Breadth Trend</div>
    <canvas id="breadthChart"></canvas>
  </div>

  <script>
    async function loadDashboard() {

      // =========================
      // 1. LOAD CURRENT SNAPSHOT
      // =========================
      const response = await fetch('./data.json');
      const data = await response.json();

      // Fill top title and cards from data.json
      document.getElementById('title').textContent = data.index + ' Market Breadth';
      document.getElementById('asOf').textContent = data.asOf;
      document.getElementById('regime').textContent = data.regime;
      document.getElementById('breadthScore').textContent = data.breadthScore;
      document.getElementById('above20DMA').textContent = data.above20DMA + '%';
      document.getElementById('above50DMA').textContent = data.above50DMA + '%';
      document.getElementById('above200DMA').textContent = data.above200DMA + '%';
      document.getElementById('advances').textContent = data.advances;
      document.getElementById('declines').textContent = data.declines;
      document.getElementById('newHighs').textContent = data.newHighs;
      document.getElementById('newLows').textContent = data.newLows;
      document.getElementById('dayChange').textContent = data.dayChange + '%';
      document.getElementById('statusNote').textContent = data.statusNote;

      // ======================
      // 2. LOAD HISTORY ARRAY
      // ======================
      const historyResponse = await fetch('./history.json');
      const historyData = await historyResponse.json();

      // ======================
      // 3. BUILD HISTORY TABLE
      // ======================
      const tbody = document.querySelector('#historyTable tbody');
      tbody.innerHTML = '';

      historyData.slice().reverse().forEach(item => {
        const row = `
          <tr>
            <td>${item.date}</td>
            <td>${item.breadthScore}</td>
            <td>${item.above20DMA}%</td>
            <td>${item.above50DMA}%</td>
            <td>${item.above200DMA}%</td>
          </tr>
        `;
        tbody.innerHTML += row;
      });

      // ======================
      // 4. PREPARE CHART DATA
      // ======================

      // Dates for x-axis
      const labels = historyData.map(item => item.date);

      // First line: Breadth Score
      const breadthScores = historyData.map(item => item.breadthScore);

      // Second line: Above 50 DMA
      // THIS is the new line you asked about
      const above50DMAData = historyData.map(item => item.above50DMA);

      // ======================
      // 5. DRAW THE CHART
      // ======================
      const ctx = document.getElementById('breadthChart').getContext('2d');

      new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'Breadth Score',
              data: breadthScores,
              borderColor: '#0077cc',
              backgroundColor: 'rgba(0, 119, 204, 0.15)',
              fill: true,
              tension: 0.3
            },
            {
              label: 'Above 50 DMA',
              data: above50DMAData,
              borderColor: '#16a34a',
              backgroundColor: 'rgba(22, 163, 74, 0.10)',
              fill: false,
              tension: 0.3
            }
          ]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              display: true
            }
          },
          scales: {
            y: {
              beginAtZero: false
            }
          }
        }
      });
    }

    // Run everything
    loadDashboard();
  </script>
</body>
</html>
