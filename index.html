<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Nifty MidSmall400 Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 30px;
    }
    h1 {
      margin-bottom: 8px;
    }
    p {
      color: #555;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 24px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .label {
      font-size: 14px;
      color: #666;
    }
    .value {
      font-size: 28px;
      font-weight: bold;
      margin-top: 8px;
    }
    .note {
      margin-top: 24px;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>
  <h1 id="title">Loading...</h1>
  <p>As of: <span id="asOf">-</span></p>

  <div class="grid">
    <div class="card">
      <div class="label">Market Regime</div>
      <div class="value" id="regime">-</div>
    </div>
    <div class="card">
      <div class="label">Breadth Score</div>
      <div class="value" id="breadthScore">-</div>
    </div>
    <div class="card">
      <div class="label">Above 20 DMA</div>
      <div class="value" id="above20DMA">-</div>
    </div>
    <div class="card">
      <div class="label">Above 50 DMA</div>
      <div class="value" id="above50DMA">-</div>
    </div>
    <div class="card">
      <div class="label">Above 200 DMA</div>
      <div class="value" id="above200DMA">-</div>
    </div>
    <div class="card">
      <div class="label">Advances</div>
      <div class="value" id="advances">-</div>
    </div>
    <div class="card">
      <div class="label">Declines</div>
      <div class="value" id="declines">-</div>
    </div>
    <div class="card">
      <div class="label">New Highs</div>
      <div class="value" id="newHighs">-</div>
    </div>
    <div class="card">
      <div class="label">New Lows</div>
      <div class="value" id="newLows">-</div>
    </div>
    <div class="card">
      <div class="label">Day Change</div>
      <div class="value" id="dayChange">-</div>
    </div>
  </div>

  <div class="note">
    <div class="label">Status Note</div>
    <div class="value" id="statusNote" style="font-size:20px;">-</div>
      <div class="note">
    <div class="label">Recent Trend</div>
    <table id="historyTable" style="width:100%; margin-top:16px; border-collapse:collapse;">
      <thead>
        <tr>
          <th style="text-align:left; padding:10px; border-bottom:1px solid #ddd;">Date</th>
          <th style="text-align:left; padding:10px; border-bottom:1px solid #ddd;">Breadth Score</th>
          <th style="text-align:left; padding:10px; border-bottom:1px solid #ddd;">Above 20 DMA</th>
          <th style="text-align:left; padding:10px; border-bottom:1px solid #ddd;">Above 50 DMA</th>
          <th style="text-align:left; padding:10px; border-bottom:1px solid #ddd;">Above 200 DMA</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  </div>

  <script>
    async function loadDashboard() {
      const response = await fetch('./data.json');
      const data = await response.json();

      document.getElementById('title').textContent = data.index + ' Market Breadth';
      document.getElementById('asOf').textContent = data.asOf;
      document.getElementById('regime').textContent = data.regime;
      document.getElementById('breadthScore').textContent = data.breadthScore;
      document.getElementById('above20DMA').textContent = data.above20DMA + '%';
      document.getElementById('above50DMA').textContent = data.above50DMA + '%';
      document.getElementById('above200DMA').textContent = data.above200DMA + '%';
      document.getElementById('advances').textContent = data.advances;
      document.getElementById('declines').textContent = data.declines;
      document.getElementById('newHighs').textContent = data.newHighs;
      document.getElementById('newLows').textContent = data.newLows;
      document.getElementById('dayChange').textContent = data.dayChange + '%';
      document.getElementById('statusNote').textContent = data.statusNote;

        const historyResponse = await fetch('./history.json');
      const historyData = await historyResponse.json();

      const tbody = document.querySelector('#historyTable tbody');
      tbody.innerHTML = '';

      historyData.slice().reverse().forEach(item => {
        const row = `
          <tr>
            <td style="padding:10px; border-bottom:1px solid #eee;">${item.date}</td>
            <td style="padding:10px; border-bottom:1px solid #eee;">${item.breadthScore}</td>
            <td style="padding:10px; border-bottom:1px solid #eee;">${item.above20DMA}%</td>
            <td style="padding:10px; border-bottom:1px solid #eee;">${item.above50DMA}%</td>
            <td style="padding:10px; border-bottom:1px solid #eee;">${item.above200DMA}%</td>
          </tr>
        `;
        tbody.innerHTML += row;
      });
    }

    loadDashboard();
  </script>
</body>
</html>
